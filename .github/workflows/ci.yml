# =============================================================================
# .github/workflows/ci.yml
# -----------------------------------------------------------------------------
# Drop into .github/workflows/ at the repo root.
#
# Jobs:
#   1. lint        — pre-commit, gitleaks, shellcheck, hadolint
#   2. build-test  — docker compose build, smoke test the API end-to-end
#                    via the Postman collection (newman), then tear down
#   3. trivy       — scan built images for HIGH/CRITICAL CVEs
#
# All three are required for merge to main (set as required checks in the
# branch protection rules — see governance/07_DEVSECOPS_GUARDRAILS.md §9).
# =============================================================================

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  DOCKER_BUILDKIT: "1"

jobs:
  # ===========================================================================
  # 1. Lint
  # ===========================================================================
  lint:
    name: lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit==3.7.1

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

      # We invoke gitleaks directly instead of via gitleaks/gitleaks-action@v2
      # because that action assumes a parent commit exists for the pushed
      # range (`<before>^..<after>`). On the very first push to a fresh repo
      # `<before>^` does not exist and the action fails with "ambiguous
      # argument", scanning 0 bytes. The direct binary invocation matches
      # exactly what we run locally via `pre-commit run` and `gitleaks detect`.
      # See journal/2026-05-09-01-bootstrap.md for the failure analysis.
      - name: Gitleaks (working tree, no git history)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.24.3
          curl -fsSL "https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --config ci/gitleaks.toml --no-git --redact -v --source .

      - name: Shellcheck
        run: bash ci/shellcheck.sh

      # Skip when no Dockerfile is present yet. hadolint-action defaults to
      # `**/Dockerfile` and exits non-zero with "does not exist" when no
      # match is found — that surfaces in Sprint 0 (no demo-app/Dockerfile yet)
      # as a CI failure even though the lint had no work to do. Once Sprint 1
      # adds demo-app/Dockerfile this conditional becomes truthy and the
      # action runs normally. See journal/2026-05-09-01-bootstrap.md.
      - name: Hadolint (every Dockerfile)
        if: hashFiles('**/Dockerfile') != ''
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning

  # ===========================================================================
  # 2. Build + smoke test
  # ===========================================================================
  # Note: this job will be RED until Sprint 1 lands docker-compose.yml and the
  # demo-app. It depends on `docker compose build` succeeding, which needs
  # those artefacts. Tracked as a known-acceptable Sprint 0 failure.
  # We do not gate the job at workflow level on hashFiles() because that
  # function is only reliable inside a step that runs after `actions/checkout`;
  # at job-level the workspace is empty and the call returns inconsistently.
  build-test:
    name: build-test
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node (for newman)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install newman
        run: npm install -g newman@6.2.1

      - name: Prepare .env
        run: |
          cp .env.example .env
          # CI runs with a fixed token so the Postman pack can hit the API.
          echo "API_TOKEN=ci-test-token-do-not-reuse" >> .env
          chmod 600 .env

      - name: Build platform images
        run: docker compose build --pull

      - name: Boot platform
        env:
          API_TOKEN: ci-test-token-do-not-reuse
        run: |
          make up
          # wait up to 30s for the API to be reachable
          for i in $(seq 1 30); do
              if curl -sf -H "X-API-Token: ${API_TOKEN}" http://localhost:18081/api/v1/envs >/dev/null 2>&1; then
                  echo "API up after ${i}s"
                  break
              fi
              sleep 1
          done

      - name: Run Postman pack against live API
        env:
          API_TOKEN: ci-test-token-do-not-reuse
        run: |
          # Override apiToken in the local env file at runtime.
          newman run postman/DevOpsSandbox.postman_collection.json \
              --environment postman/DevOpsSandbox-Local.postman_environment.json \
              --env-var "apiToken=${API_TOKEN}" \
              --reporters cli,junit \
              --reporter-junit-export newman-results.xml

      - name: Upload newman results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: newman-results.xml

      - name: Upload platform logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: platform-logs
          path: |
            logs/
            envs/

      - name: Tear down
        if: always()
        run: make down || true

  # ===========================================================================
  # 3. Trivy CVE scan
  # ===========================================================================
  # Note: like build-test, this job will be RED until Sprint 1 lands
  # docker-compose.yml. It needs a built image to scan; nothing to scan
  # until compose can build something.
  trivy:
    name: trivy
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build --pull

      - name: Trivy — fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: devops-sandbox-api:latest
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
